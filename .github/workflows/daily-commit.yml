{{ config(
    materialized = 'table',
    tags = ['mart', 'operations', 'support'],
    meta = {
        'owner': 'ops_analytics',
        'domain': 'fulfillment_and_support'
    }
) }}

/* 
   Note: Freshness is typically defined in a YAML schema file. 
   If using dbt Cloud/Enterprise for state-aware runs, 
   ensure your environment supports model-level freshness configs.
*/

with inventory_snapshots as (
    select 
        snapshot_date as report_date, 
        sku, 
        coalesce(system_on_hand_qty, 0) as system_on_hand_qty, 
        coalesce(physical_count_qty, 0) as physical_count_qty 
    from {{ ref('stg_inventory_counts') }} 
    where snapshot_date >= current_date - interval '14 day'
), 

shipments as (
    select 
        shipment_id, 
        shipment_created_at::date as report_date, 
        status,
        promised_delivery_date::date as promised_delivery_date, 
        case when status = 'delivered' and delivered_at <= promised_delivery_date then 1 else 0 end as is_on_time 
    from {{ ref('stg_shipments') }} 
    where shipment_created_at::date >= current_date - interval '14 day'
), 

tickets as (
    select 
        ticket_id, 
        created_at::date as report_date, 
        ticket_priority, 
        coalesce(handle_minutes, 0) as handle_minutes 
    from {{ ref('stg_support_tickets') }} 
    where created_at::date >= current_date - interval '14 day'
),

daily_support as (
    select 
        report_date, 
        count(distinct ticket_id) as total_tickets, 
        avg(handle_minutes) as avg_handle_minutes, 
        count(distinct case when ticket_priority = 'high' then ticket_id end) as high_priority_tickets 
    from tickets 
    group by 1
),

daily_cycle_accuracy as (
    select 
        report_date, 
        count(distinct sku) as total_skus_counted, 
        coalesce(
            1.0 * count(distinct case when system_on_hand_qty = physical_count_qty then sku end) / 
            nullif(count(distinct sku), 0), 0.0
        ) as cycle_accuracy_rate 
    from inventory_snapshots 
    group by 1
),

daily_fulfillment as (
    select 
        report_date, 
        count(distinct shipment_id) as total_shipments, 
        coalesce(sum(is_on_time), 0) as on_time_deliveries 
    from shipments 
    group by 1
),

final as (
    select 
        -- Coalesce across all three sources for the primary key
        coalesce(ca.report_date, ff.report_date, st.report_date) as report_date,
        
        -- Support
        coalesce(st.total_tickets, 0) as total_tickets,
        coalesce(st.avg_handle_minutes, 0.0) as avg_handle_minutes,
        coalesce(st.high_priority_tickets, 0) as high_priority_tickets,
        
        -- Inventory
        coalesce(ca.total_skus_counted, 0) as total_skus_counted,
        coalesce(ca.cycle_accuracy_rate, 0.0) as cycle_accuracy_rate,
        
        -- Fulfillment
        coalesce(ff.total_shipments, 0) as total_shipments,
        coalesce(ff.on_time_deliveries, 0) as on_time_deliveries
        
    from daily_cycle_accuracy ca
    full outer join daily_fulfillment ff 
        on ca.report_date = ff.report_date
    full outer join daily_support st 
        -- Key fix: coalesce the already joined dates to join the third table correctly
        on coalesce(ca.report_date, ff.report_date) = st.report_date
)

select * from final order by report_date desc
